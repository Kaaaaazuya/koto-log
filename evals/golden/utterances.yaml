      stage: extract
      note: "extract_records の child はメッセージ全体で1件のみ（レコード単位ではない）ため、1発話内で複数児を扱う正解は現行ツール定義では表現不能。児ごとの分離ができないことを検出するためのケース（#43参照）。"
      records:
        - type: baby_food
        - type: feeding
          sub_type: ミルク
          amount: 120
          unit: ml

