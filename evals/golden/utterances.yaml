# E1-1: ツール呼び出し正しさ評価のためのゴールデンセット。
#
# 注記: Turso には生の発話ログ（ユーザーが実際に打ったテキスト）を保存する
# テーブルが存在しない（records には保存結果のみが残る）。そのため本ファイルは
# 「実発話ログからの自動抽出」ではなく、ドメイン知識と既存テスト
# （tests/unit/test_extractor.py, evals/tool_selection.py 等）を参考にした
# 手動作成のケース集である（issue #64 コメント参照）。
#
# 実装の実際のルーティング（src/kotolog/agent/loop.py Agent.handle）:
#   1. まず extract_records を強制呼び出しし、records（0件以上の配列）を得る。
#      records が1件以上あれば、それぞれ save_record として保存されて完了する。
#   2. records が空の場合のみ、通常の TOOLS
#      （save_record / query_records / update_or_delete_record / set_config）
#      を使ったループにフォールバックする。
#
# 各ケースの `expected.stage` はどちらの段で判定すべきかを示す:
#   - extract: extract_records が非空の records を返すべき（記録として保存される発話）
#   - loop:    extract_records は空を返し、ループ側で特定の tool/args が呼ばれるべき
#              （集計・修正・設定変更などの発話）
#   - none:    extract_records は空を返し、ループ側でもツールを呼ばず自由文で返すべき
#              （記録に該当しない雑談・質問）
#
# 時刻表現（started_at 等）はユーザーの発話をそのまま渡すのが正しい（executor側で
# 相対→絶対に正規化される）。採点側（#65）で許容幅を設けて比較する想定。

