services:
  - type: web
    name: koto-log
    runtime: docker
    healthCheckPath: /health
    envVars:
      # LLM（本番は Claude Haiku を推奨）
      - key: KOTOLOG_MODEL
        sync: false
      - key: KOTOLOG_API_KEY
        sync: false
      # Turso クラウドDB
      - key: KOTOLOG_DB_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      # LINE Messaging API
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      # その他
      - key: KOTOLOG_DEFAULT_CHILD
        value: baby
