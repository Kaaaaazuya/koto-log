name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 1 * * 1" # 毎週月曜 01:00 UTC

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: pip-audit (CVE scan)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v5.4.1
        with:
          enable-cache: true

      - name: Export requirements
        # --no-emit-project: 自プロジェクト（editable）を除外。含めると pip-audit の
        # --require-hashes 相当の検証でハッシュ不可能として失敗する
        run: uv export --frozen --no-dev --no-emit-project --format requirements-txt -o /tmp/requirements.txt

      - name: Audit dependencies
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: /tmp/requirements.txt

  sast:
    name: bandit (SAST)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v5.4.1
        with:
          enable-cache: true

      - name: Install bandit
        run: uv tool install bandit

      - name: Run bandit
        # -ll: medium severity 以上のみ報告、-ii: medium confidence 以上のみ
        run: |
          bandit -r src/ -ll -ii --exit-zero --format json | tee /tmp/bandit.json
          count=$(jq '.results | length' /tmp/bandit.json)
          if [ "$count" -gt 0 ]; then
            jq -r '.results[] | "[\(.issue_severity)/\(.issue_confidence)] \(.filename):\(.line_number) - \(.issue_text)"' /tmp/bandit.json
            exit 1
          fi
