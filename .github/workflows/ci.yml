name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v5.4.1
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Lint (ruff)
        run: uv run ruff check . && uv run ruff format --check .

      - name: Test with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-report=json -q

      - name: Coverage threshold (warn only)
        run: uv run coverage report --fail-under=80
        continue-on-error: true

  docker-build:
    name: Docker build (validate image)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Dockerfile が壊れていないかを Render デプロイ前に検証（push はしない）
      - name: Build image
        run: docker build -t koto-log:ci .
