name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v5.4.1
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Lint (ruff)
        run: uv run ruff check . && uv run ruff format --check .

      - name: Test with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-report=json -q

      - name: Coverage threshold (warn only)
        run: uv run coverage report --fail-under=80
        continue-on-error: true

  docker-build:
    name: Docker build (validate image)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Dockerfile が壊れていないかを Render デプロイ前に検証（push はしない）
      - name: Build image
        run: docker build -t koto-log:ci .
