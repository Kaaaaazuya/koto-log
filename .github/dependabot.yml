version: 2
updates:
  # GitHub Actions の SHA ピン留めを自動更新
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-patch:
        update-types: ["patch"]
      actions-minor:
        update-types: ["minor"]
      # major は個別 PR（破壊的変更のため手動レビュー必須）

  # Python 依存関係 (uv / pip)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "python"
    groups:
      python-deps-patch:
        update-types: ["patch"]
      python-deps-minor:
        update-types: ["minor"]
      # major は個別 PR（破壊的変更のため手動レビュー必須）
