<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>koto-log インポート</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #333; padding: 24px; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; color: #555; }
    h2 { font-size: 1rem; margin-bottom: 12px; color: #666; }
    .back { font-size: .85rem; color: #888; margin-bottom: 24px; display: block; }
    .card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    label { display: block; font-size: .85rem; color: #888; margin-bottom: 4px; }
    input[type="file"] { display: block; margin-bottom: 16px; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: .95rem; text-decoration: none; }
    .btn-primary { background: #06c755; color: #fff; }
    .btn-secondary { background: #eee; color: #555; }
    .btn:hover { opacity: .85; }
    .notice { padding: 10px 14px; border-radius: 6px; font-size: .9rem; margin-bottom: 16px; }
    .notice-ok { background: #e6f4ea; color: #2d7a3a; }
    .hint { font-size: .8rem; color: #aaa; margin-top: 4px; margin-bottom: 12px; line-height: 1.5; }
    ol { padding-left: 1.4rem; font-size: .85rem; color: #555; line-height: 2; }
  </style>
</head>
<body>
  <h1>他アプリからの移行</h1>
  <a class="back" href="/admin?token={{ token }}">← 管理画面に戻る</a>

  {% if imported is not none %}
  <div class="notice notice-ok">
    インポート完了：{{ imported }} 件を追加、{{ skipped }} 件はスキップ（重複）しました。
  </div>
  {% endif %}

  <div class="card">
    <h2>ぴよログ（テキスト形式）</h2>
    <p class="hint">
      ぴよログアプリのバックアップ（テキスト形式）をアップロードします。<br>
      既に同じ日時・種別の記録がある場合は重複としてスキップします。
    </p>

    <label>エクスポート手順</label>
    <ol>
      <li>ぴよログアプリ → メニュー → バックアップ</li>
      <li>「テキスト形式で送る」を選択してファイルを保存</li>
      <li>保存した .txt ファイルを下のフォームで選択してアップロード</li>
    </ol>

    <form method="POST" action="/admin/import/piyolog?token={{ token }}" enctype="multipart/form-data" style="margin-top:16px">
      <label>バックアップファイル（.txt）</label>
      <input type="file" name="file" accept=".txt,.csv,.tsv" required>
      <button type="submit" class="btn btn-primary">インポート</button>
    </form>
  </div>
</body>
</html>
