<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>koto-log ログイン</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .login-container { background: #fff; border-radius: 10px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,.12); width: 100%; max-width: 400px; }
    h1 { font-size: 1.4rem; margin-bottom: 24px; color: #555; text-align: center; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .85rem; color: #888; margin-bottom: 6px; }
    input[type="password"], input[type="text"] {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 1rem; font-family: inherit;
    }
    input[type="password"]:focus, input[type="text"]:focus {
      outline: none; border-color: #06c755; box-shadow: 0 0 0 2px rgba(6, 199, 85, .1);
    }
    button { display: block; width: 100%; padding: 12px 20px; background: #06c755; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 500; margin-top: 20px; }
    button:hover { opacity: .85; }
    .hint { font-size: .8rem; color: #aaa; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>koto-log 管理</h1>
    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label for="token">トークン</label>
        <input type="password" id="token" name="token" required>
        <p class="hint">管理画面トークンを入力してください。</p>
      </div>
      <button type="submit">ログイン</button>
    </form>
  </div>
</body>
</html>
